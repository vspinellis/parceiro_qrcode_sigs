<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assine SKY - Atendimento Autorizado</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23EE1C25'/><text x='31' y='46' font-family='Arial, sans-serif' font-size='25' font-weight='900' font-style='italic' fill='%23ffffff' text-anchor='middle'>SKY</text></svg>">
    <link rel="preconnect" href="https://sps.sigs.com.br">
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body class="bg-sky-gray min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white w-full max-w-[450px] rounded-2xl shadow-2xl overflow-hidden relative">
        
        <div class="bg-sky-dark p-6 text-center border-b-4 border-sky-red">
            <div class="text-white font-bold text-3xl tracking-tighter uppercase italic">
                Assine<span class="text-sky-red"> SKY</span>
            </div>
            <p class="text-gray-400 text-[10px] mt-1 uppercase tracking-widest font-extrabold">Parceiro Autorizado</p>
        </div>

        <div class="p-8" id="mainContent">
            <div id="alertBox" class="hidden p-4 mb-6 rounded-xl text-sm font-medium border"></div>

            <div id="formWrapper">
                <div class="text-center mb-6">
                    <h2 class="text-2xl font-black text-sky-dark uppercase italic">Falta pouco!</h2>
                    <p class="text-gray-500 text-sm">O que você tem interesse hoje?</p>
                </div>

                <form id="leadForm" class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-sky-red/30 transition-all has-[:checked]:border-sky-red has-[:checked]:bg-red-50 group">
                            <input type="checkbox" name="interesse" value="POS_PAGO" class="hidden peer">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter group-has-[:checked]:text-sky-red">SKY</span>
                            <span class="text-sm font-bold text-sky-dark">Pós-Pago</span>
                        </label>

                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-sky-red/30 transition-all has-[:checked]:border-sky-red has-[:checked]:bg-red-50 group">
                            <input type="checkbox" name="interesse" value="PRE_PAGO" class="hidden peer">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter group-has-[:checked]:text-sky-red">SKY</span>
                            <span class="text-sm font-bold text-sky-dark">Pré-Pago</span>
                        </label>

                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-sky-red/30 transition-all has-[:checked]:border-sky-red has-[:checked]:bg-red-50 group">
                            <input type="checkbox" name="interesse" value="MOVEL" class="hidden peer">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter group-has-[:checked]:text-sky-red">SKY</span>
                            <span class="text-sm font-bold text-sky-dark">Móvel</span>
                        </label>

                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-gray-100 rounded-xl cursor-pointer hover:border-sky-red/30 transition-all has-[:checked]:border-sky-red has-[:checked]:bg-red-50 group">
                            <input type="checkbox" name="interesse" value="INTERNET" class="hidden peer">
                            <span class="text-[10px] font-black text-gray-400 uppercase tracking-tighter group-has-[:checked]:text-sky-red">SKY</span>
                            <span class="text-sm font-bold text-sky-dark">Internet</span>
                        </label>
                    </div>

                    <div class="pt-2 space-y-4">
                        <div>
                            <input type="text" id="nome" required 
                                class="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-sky-red outline-none"
                                placeholder="Seu nome completo">
                        </div>

                        <div>
                            <input type="tel" id="telefone" required 
                                class="w-full px-4 py-3.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-sky-red outline-none"
                                placeholder="Seu WhatsApp (00) 00000-0000" maxlength="15">
                        </div>
                    </div>

                    <div class="flex items-start gap-3 bg-gray-50 p-4 rounded-xl border border-gray-100">
                        <input type="checkbox" id="aceite_termos" required class="w-5 h-5 accent-sky-red cursor-pointer mt-1">
                        <label for="aceite_termos" class="text-[10px] text-gray-500 leading-tight">
                            Concordo com o tratamento dos meus dados para fins de atendimento comercial de acordo com a LGPD.
                        </label>
                    </div>

                    <div class="flex justify-center py-2">

<div class="cf-turnstile" data-sitekey="0x4AAAAAAC_crVDLvcFq_AT6" data-callback="onTurnstileSuccess"></div>

</div>

                    <button type="submit" id="submitBtn" disabled 
                        class="w-full bg-sky-red hover:bg-red-700 text-white font-black py-4 rounded-xl shadow-xl transform active:scale-[0.97] transition-all disabled:opacity-40 uppercase tracking-widest text-base">
                        Receber Atendimento
                    </button>
                </form>
            </div>
        </div>

        <div class="bg-gray-50 p-4 text-center border-t border-gray-100">
            <p class="text-[9px] text-gray-400 uppercase font-black tracking-widest">Consultoria Autorizada SKY</p>
        </div>

        <div id="loadingOverlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-50">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-gray-100 border-t-sky-red mb-4"></div>
            <p class="text-xs font-black text-sky-dark uppercase tracking-widest">Enviando dados...</p>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO DE AMBIENTE AUTOMÁTICA
        // ==========================================
        const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        const API_BASE_URL = isLocal ? 'http://localhost:3333' : 'https://sps.sigs.com.br';
        // ==========================================

        const telInput = document.getElementById('telefone');
        telInput.addEventListener('input', (e) => {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '(' + x[1] + ') ' + x[2] + (x[3] ? '-' + x[3] : '');
        });

        const urlParams = new URLSearchParams(window.location.search);
        const partnerToken = urlParams.get('parceiro');
        let turnstileToken = '';

        function onTurnstileSuccess(token) {
            turnstileToken = token;
            if (partnerToken) document.getElementById('submitBtn').disabled = false;
            else showAlert('Código de parceiro ausente.', 'error');
        }

        function showAlert(message, type) {
            const alertBox = document.getElementById('alertBox');
            alertBox.className = `p-4 mb-6 rounded-xl text-sm font-medium border ${type === 'error' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-green-50 text-green-700 border-green-200'}`;
            alertBox.innerText = message;
            alertBox.classList.remove('hidden');
        }

        document.getElementById('leadForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const interesses = Array.from(document.querySelectorAll('input[name="interesse"]:checked')).map(el => el.value);
            
            if (interesses.length === 0) {
                showAlert('Por favor, selecione ao menos um produto.', 'error');
                return;
            }

            const btn = document.getElementById('submitBtn');
            const overlay = document.getElementById('loadingOverlay');
            const content = document.getElementById('mainContent');
            
            btn.disabled = true;
            overlay.classList.remove('hidden');

            const payload = {
                qrcode_token: partnerToken,
                nome: document.getElementById('nome').value,
                telefone: document.getElementById('telefone').value.replace(/\D/g, ''),
                interesse: interesses,
                aceitou_termos: document.getElementById('aceite_termos').checked,
                cf_turnstile_response: turnstileToken
            };

            try {
                const response = await fetch(`${API_BASE_URL}/comercial/qr-code-leads`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    content.innerHTML = `
                        <div class="text-center py-12 px-4">
                            <div class="bg-green-500 text-white w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                            </div>
                            <h3 class="text-2xl font-black text-sky-dark uppercase italic">Tudo pronto!</h3>
                            <p class="text-gray-500 mt-4 leading-relaxed">Recebemos seu interesse em <b>${interesses.join(', ')}</b>. Um consultor entrará em contato em breve!</p>
                        </div>
                    `;
                } else {
                    showAlert('Erro ao enviar dados.', 'error');
                    btn.disabled = false;
                }
            } catch (error) {
                showAlert('Falha na conexão.', 'error');
                btn.disabled = false;
            } finally {
                overlay.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
